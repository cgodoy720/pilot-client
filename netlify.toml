[build]
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.9.0"
  # Netlify builders run on 4GB containers; Vite's bundler can hit V8's
  # default ~1.7GB old-space ceiling on this codebase and OOM. Bump to 4GB.
  NODE_OPTIONS = "--max-old-space-size=4096"

