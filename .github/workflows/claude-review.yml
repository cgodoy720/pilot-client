name: Claude Code Review

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request. Focus only on: security issues, bugs, and breaking changes.
            Be concise. Post a single summary comment with your findings. Skip minor style issues.
          claude_args: "--model claude-sonnet-4-6 --max-turns 20 --allowedTools Bash,Read,Glob,Grep,WebSearch"
