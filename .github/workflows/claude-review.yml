name: Claude Code Review

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          show_full_output: true
          prompt: |
            Do not use the Skill tool or any /review slash command — perform this review directly.
            This PR targets `${{ github.base_ref }}`. Run `git diff origin/${{ github.base_ref }}...HEAD`
            yourself to get the PR's changes, read the affected files, and review for security issues,
            bugs, and breaking changes. Be concise. Skip minor style issues. Post your findings as a
            single summary by updating the Claude tracking comment.
          claude_args: "--model claude-sonnet-4-6 --max-turns 80 --allowedTools Bash,Read,Glob,Grep,WebSearch,mcp__github_comment__update_claude_comment --disallowedTools Skill"
